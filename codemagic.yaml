workflows:

  # ─── iOS Unsigned IPA (Free Apple Account) ────────────────────────────────────
  ios-unsigned-build:
    name: iOS Unsigned IPA (Free Apple Account)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Flutter clean
        script: flutter clean
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS app (no codesign)
        script: flutter build ios --release --no-codesign
      - name: Create unsigned IPA
        script: |
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ios_unsigned.ipa Payload
    artifacts:
      - build/ios/iphoneos/ios_unsigned.ipa

  # ─── Android APK (Release) ────────────────────────────────────────────────────
  android-release-apk:
    name: Android Release APK
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Flutter clean
        script: flutter clean
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  # ─── Android APK (Debug) ─────────────────────────────────────────────────────
  android-debug-apk:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Flutter clean
        script: flutter clean
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android Debug APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  # ─── Android App Bundle (AAB for Play Store) ─────────────────────────────────
  android-appbundle:
    name: Android App Bundle (Play Store)
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Flutter clean
        script: flutter clean
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android App Bundle
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab

  # ─── Both Android + iOS in one run ───────────────────────────────────────────
  android-and-ios:
    name: Android APK + iOS Unsigned IPA
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      java: 17
    scripts:
      - name: Flutter clean
        script: flutter clean
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --release
      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign
      - name: Create unsigned IPA
        script: |
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ios_unsigned.ipa Payload
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/ios/iphoneos/ios_unsigned.ipa