name: strava_project
description: "A Strava-like fitness tracking app with real-time GPS route tracking."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Maps (OpenStreetMap - no API key needed)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Google Maps
  google_maps_flutter: ^2.15.0

  # GPS / Location
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # Local Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # Camera & Gallery
  image_picker: ^1.1.2

  # Share
  share_plus: ^12.0.1

  # UI & Fonts
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # App icon generator - run: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.13.1

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/

# App launcher icon configuration
# Place your logo at: assets/icon/app_icon.png (1024x1024 recommended)
# Then run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21